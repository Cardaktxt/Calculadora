<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <title>Calculadora</title>
</head>

<body>
    <main>
        <h1>Calculadora simple de uso diario</h1>

        <div class="box-primary">

            <input id="result" type="text" disabled placeholder="Numbers">

            <div class="box-secondary">
                <div id="numbers">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>0</button>
                    <button>00</button>
                    <button>,</button>
                </div>

                <div id="operations">
                    <button id="deleteAll"><strong>AC</strong></button>
                    <button id="delete"><i class="fi fi-br-left"></i></button>
                    <button id="percentage"><i class="fi fi-br-percentage"></i></button>
                    <button id="add"><i class="fi fi-br-plus"></i></button>
                    <button id="rest"><i class="fi fi-br-minus"></i></button>
                    <button id="multi"><i class="fi fi-br-cross"></i></button>
                    <button id="divide"><i class="fi fi-br-divide"></i></button>
                    <button id="equal"><i class="fi fi-br-equals"></i></button>

                </div>

            </div>

        </div>

    </main>
    <script src="./script.js"></script>
</body>

</html>
